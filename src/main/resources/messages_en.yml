# L-BedWarsProxy English Messages
console:
  enabled: "L-BedWarsProxy enabled. Tracking {servers} servers on port {port}."
  socket-listening: "Socket server listening on port {port} (max {max} connections)"
  socket-open-fail: "Could not open socket port {port}: {error}"
  socket-accept-error: "Socket accept error: {error}"
  blocked-not-whitelisted: "Blocked connection from {ip} (not in whitelist)"
  blocked-too-many: "Blocked connection from {ip} (too many connections)"
  socket-timeout: "Socket timeout for {ip}"
  server-disconnected: "Game server disconnected: {name}"
  expected-hello: "Expected HELLO"
  unsupported-protocol: "Rejected connection from {ip} (unsupported protocol: {protocol})"
  expected-auth: "Expected AUTH"
  auth-failed: "Authentication failed from {ip} ({name})"
  auth-ok: "Game server authenticated: {name} ({ip})"
  hmac-invalid: "Invalid HMAC signature from {name}"
  json-invalid: "Invalid JSON from {name}"
  arena-timed-out: "Arena {name} timed out (no update for {seconds}s)"
  folia-fallback: "Folia scheduler not available, using Bukkit scheduler."
  cidr-invalid: "Invalid CIDR entry: {entry}"
  ip-invalid: "Invalid IP entry: {entry}"
  health-check-disabled: "Health check is disabled, skipping timeout detection."

command:
  player-only: "&cThis command can only be used by players."
  usage: "&cUsage: /bw join <solo|duo|trio|quad>"
  invalid-mode: "&cInvalid mode! Use: solo, duo, trio, quad"
  no-arena: "&cNo available {mode} arena found. Try again later."
  connect-fail: "&cFailed to connect to server."
  rejoin-no-data: "&cNo rejoin data found. You may have reconnected too late or your bed was destroyed."

stats:
  db-disabled: "&cDatabase is not configured. Stats are unavailable."
  no-data: "&cNo stats found for player &e{player}&c."
  header: "&6&l=== &e{player} &6&l==="
  kills: "&fKills: &a{value}"
  deaths: "&fDeaths: &a{value}"
  final-kills: "&fFinal Kills: &a{value}"
  final-deaths: "&fFinal Deaths: &a{value}"
  wins: "&fWins: &a{value}"
  losses: "&fLosses: &a{value}"
  beds: "&fBeds Broken: &a{value}"
  games: "&fGames Played: &a{value}"
  kdr: "&fK/D: &a{value}"
  level: "&fLevel: &a{value} &7(XP: &a{xp}&7)"

admin:
  usage: "&cUsage: /bwa gui [all|solo|duo|trio|quad] | /bwa tp <player> | /bwa leaderboard [stat] | /bwa hologram <set [stat]|remove [id]|list>"
  no-permission: "&cNo permission."
  invalid-filter: "&cInvalid filter! Use: all, solo, duo, trio, quad"
  invalid-stat: "&cInvalid stat! Use: kills, wins, final_kills, deaths, final_deaths, beds_broken"
  connect-fail: "&cFailed to connect to {server}."
  tp-usage: "&cUsage: /bwa tp <player>"
  tp-not-found: "&cPlayer {player} not found on any server."
  hologram-usage: "&cUsage: /bwa hologram <set [stat]|remove [id]|list>"

party:
  leader-joined: "&eYour party leader &a{player} &ejoined &b{server}&e. Connecting you..."

queue:
  added: "&eNo &a{mode} &earena available. You are &a#{position}&e in queue (&a{size}&e total). You will be connected automatically when a slot opens."
  connected: "&aA slot opened! Connecting you to &b{server}&a."

hologram:
  title: "&6&lLeaderboard: &e{stat}"
  title-kills: "&6&lTop Kills"
  title-deaths: "&6&lTop Deaths"
  title-final_kills: "&6&lTop Final Kills"
  title-final_deaths: "&6&lTop Final Deaths"
  title-wins: "&6&lTop Wins"
  title-losses: "&6&lTop Losses"
  title-beds_broken: "&6&lTop Beds Broken"
  title-games_played: "&6&lTop Games Played"
  line: "{rank}. {player} &7- {value}"
  color-1: "&6"
  color-2: "&7"
  color-3: "&c"
  color-default: "&f"
  no-data: "&7No data available"
  set: "&aLeaderboard hologram placed at your location. ID: {id}, Stat: {stat}"
  removed: "&cHologram {id} removed."
  not-found: "&cHologram with ID {id} not found."
  none: "&cNo holograms exist."
  list-entry: "&7ID: &f{id} &8| &7Stat: &f{stat} &8| &7{world} &f{x}, {y}, {z}"